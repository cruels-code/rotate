<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezos Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e0e0e0;
            /* Light gray background */
        }

        .canvas-wrapper {
            position: relative;
            width: min(90vw, 70vh);
            height: min(90vw, 70vh);
        }

        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: filter 0.5s ease;
            cursor: pointer;
            filter: grayscale(0%) url(#sharpen-fx);
        }

        .canvas-container.grayscale-mode {
            filter: grayscale(100%) url(#sharpen-fx);
        }

        .terminal-container {
            transition: filter 0.5s ease;
            filter: grayscale(0%) url(#sharpen-fx);
        }

        .terminal-container.grayscale-mode {
            filter: grayscale(100%) url(#sharpen-fx);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
            border-radius: 0.5rem;
            background-color: transparent;
            touch-action: none;
            transform-origin: center center;
            transition: transform 0.7s ease-in-out;
        }

        #noiseDisplayCanvas,
        #glitchDisplayCanvas,
        #glitch2DisplayCanvas,
        #glitch3DisplayCanvas,
        #glitch4DisplayCanvas,
        #glitch5DisplayCanvas,
        #terminalDisplayCanvas {
            box-shadow: none;
            filter: url(#noise-fx);
        }

        #paintCanvas {
            background-color: #000000;
            /* Dark Canvas */
            filter: url(#artistic-fx);
        }

        .info-box {
            font-family: 'Roboto Mono', monospace;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen overflow-hidden">

    <div class="w-full h-full flex flex-col items-center justify-center group">

        <div class="canvas-wrapper">
            <div class="canvas-container">
                <canvas id="paintCanvas"></canvas>
            <canvas id="animationCanvas"></canvas>
            <canvas id="noiseDisplayCanvas"></canvas>
            <canvas id="glitchDisplayCanvas"></canvas>
            <canvas id="glitch2DisplayCanvas"></canvas>
            <canvas id="glitch3DisplayCanvas"></canvas>
            <canvas id="glitch4DisplayCanvas"></canvas>
            <canvas id="glitch5DisplayCanvas"></canvas>
            <canvas id="terminalDisplayCanvas"></canvas>
            <svg style="display:none">
                <filter id="artistic-fx" x="-20%" y="-20%" width="140%" height="140%">
                    <!-- Impasto: Create a bump map from alpha and apply specular lighting -->
                    <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
                    <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20"
                        lighting-color="#ffffff" result="impasto">
                        <fePointLight x="540" y="-500" z="1000" />
                    </feSpecularLighting>
                    <feComposite in="impasto" in2="SourceAlpha" operator="in" result="impasto-clipped" />
                    <feBlend in="SourceGraphic" in2="impasto-clipped" mode="screen" result="lit-painting" />
                </filter>
                <filter id="noise-fx" x="-20%" y="-20%" width="140%" height="140%">
                    <!-- Inner Shadow -->
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" result="blur"/>
                    <feOffset dx="3" dy="3" result="offsetBlur"/>
                    <feComponentTransfer in="offsetBlur" result="inverseBlur">
                        <feFuncA type="linear" slope="-1" intercept="1"/>
                    </feComponentTransfer>
                    <feComposite in="inverseBlur" in2="SourceAlpha" operator="in" result="innerShadowAlpha"/>
                    <feFlood flood-color="black" flood-opacity="0.95" result="shadowColor"/>
                    <feComposite in="shadowColor" in2="innerShadowAlpha" operator="in" result="innerShadow"/>
                    <feComposite in="innerShadow" in2="SourceGraphic" operator="over" result="withInnerShadow"/>

                    <!-- Emboss -->
                    <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="embossBlur" />
                    <feSpecularLighting in="embossBlur" surfaceScale="5" specularConstant="1.4" specularExponent="20" lighting-color="#ffffff" result="embossLight">
                        <fePointLight x="540" y="-500" z="1000" id="noise-light" />
                    </feSpecularLighting>
                    <feComposite in="embossLight" in2="SourceAlpha" operator="in" result="embossClipped" />
                    <feBlend in="withInnerShadow" in2="embossClipped" mode="screen" result="final" />
                </filter>
                <filter id="sharpen-fx">
                    <feConvolveMatrix order="3 3" preserveAlpha="true" kernelMatrix="
                        0 -1  0
                       -1  5 -1
                        0 -1  0" />
                </filter>
            </svg>
        </div>
        </div>

        <div id="address-display" class="mt-6 w-[min(90vw,70vh)] bg-black border-2 border-green-500/40 rounded-sm p-4 font-mono text-left shadow-[0_0_15px_rgba(34,197,94,0.15)] relative overflow-hidden terminal-container opacity-0 transition-opacity duration-300 group-hover:opacity-100">
            <div class="absolute inset-0 pointer-events-none bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.25)_50%)] bg-[length:100%_4px]"></div>
            <pre id="address-text" class="text-[9.5px] leading-tight text-green-400 whitespace-pre-wrap m-0 font-mono drop-shadow-[0_0_5px_rgba(74,222,128,0.6)] relative z-10">> Fetching transactions...</pre>
            <pre id="download-gif-btn" class="text-[9.5px] leading-tight text-green-400 whitespace-pre-wrap m-0 font-mono drop-shadow-[0_0_5px_rgba(74,222,128,0.6)] relative z-10 cursor-pointer hover:text-white transition-colors mt-2">> Download GIF</pre>
        </div>
    </div>

    <script>
        const animationCanvas = document.getElementById('animationCanvas');
        const animationCtx = animationCanvas.getContext('2d');
        const paintCanvas = document.getElementById('paintCanvas');
        const paintCtx = paintCanvas.getContext('2d');
        const noiseDisplayCanvas = document.getElementById('noiseDisplayCanvas');
        const noiseDisplayCtx = noiseDisplayCanvas.getContext('2d');
        const glitchDisplayCanvas = document.getElementById('glitchDisplayCanvas');
        const glitchDisplayCtx = glitchDisplayCanvas.getContext('2d');
        const glitch2DisplayCanvas = document.getElementById('glitch2DisplayCanvas');
        const glitch2DisplayCtx = glitch2DisplayCanvas.getContext('2d');
        const glitch3DisplayCanvas = document.getElementById('glitch3DisplayCanvas');
        const glitch3DisplayCtx = glitch3DisplayCanvas.getContext('2d');
        const glitch4DisplayCanvas = document.getElementById('glitch4DisplayCanvas');
        const glitch4DisplayCtx = glitch4DisplayCanvas.getContext('2d');
        const glitch5DisplayCanvas = document.getElementById('glitch5DisplayCanvas');
        const glitch5DisplayCtx = glitch5DisplayCanvas.getContext('2d');
        const terminalDisplayCanvas = document.getElementById('terminalDisplayCanvas');
        const terminalDisplayCtx = terminalDisplayCanvas.getContext('2d');
        const addressText = document.getElementById('address-text');

        const noiseCanvas = document.createElement('canvas');
        noiseCanvas.width = 32;
        noiseCanvas.height = 32;
        const noiseCtx = noiseCanvas.getContext('2d');

        const noiseMaskCanvas = document.createElement('canvas');
        const noiseMaskCtx = noiseMaskCanvas.getContext('2d');
        const activeNoiseMaskCanvas = document.createElement('canvas');
        const activeNoiseMaskCtx = activeNoiseMaskCanvas.getContext('2d');

        const glitchCanvas = document.createElement('canvas');
        glitchCanvas.width = 128;
        glitchCanvas.height = 128;
        const glitchCtx = glitchCanvas.getContext('2d');

        const glitchMaskCanvas = document.createElement('canvas');
        const glitchMaskCtx = glitchMaskCanvas.getContext('2d');
        const activeGlitchMaskCanvas = document.createElement('canvas');
        const activeGlitchMaskCtx = activeGlitchMaskCanvas.getContext('2d');

        const glitch2Canvas = document.createElement('canvas');
        glitch2Canvas.width = 128;
        glitch2Canvas.height = 128;
        const glitch2Ctx = glitch2Canvas.getContext('2d');

        const glitch2MaskCanvas = document.createElement('canvas');
        const glitch2MaskCtx = glitch2MaskCanvas.getContext('2d');
        const activeGlitch2MaskCanvas = document.createElement('canvas');
        const activeGlitch2MaskCtx = activeGlitch2MaskCanvas.getContext('2d');

        const glitch3Canvas = document.createElement('canvas');
        glitch3Canvas.width = 256;
        glitch3Canvas.height = 256;
        const glitch3Ctx = glitch3Canvas.getContext('2d');

        const glitch3MaskCanvas = document.createElement('canvas');
        const glitch3MaskCtx = glitch3MaskCanvas.getContext('2d');
        const activeGlitch3MaskCanvas = document.createElement('canvas');
        const activeGlitch3MaskCtx = activeGlitch3MaskCanvas.getContext('2d');

        const glitch4Canvas = document.createElement('canvas');
        glitch4Canvas.width = 256;
        glitch4Canvas.height = 256;
        const glitch4Ctx = glitch4Canvas.getContext('2d');

        const glitch4MaskCanvas = document.createElement('canvas');
        const glitch4MaskCtx = glitch4MaskCanvas.getContext('2d');
        const activeGlitch4MaskCanvas = document.createElement('canvas');
        const activeGlitch4MaskCtx = activeGlitch4MaskCanvas.getContext('2d');

        const glitch5Canvas = document.createElement('canvas');
        glitch5Canvas.width = 256;
        glitch5Canvas.height = 256;
        const glitch5Ctx = glitch5Canvas.getContext('2d');

        const glitch5MaskCanvas = document.createElement('canvas');
        const glitch5MaskCtx = glitch5MaskCanvas.getContext('2d');
        const activeGlitch5MaskCanvas = document.createElement('canvas');
        const activeGlitch5MaskCtx = activeGlitch5MaskCanvas.getContext('2d');

        const terminalCanvas = document.createElement('canvas');
        terminalCanvas.width = 256;
        terminalCanvas.height = 256;
        const terminalCtx = terminalCanvas.getContext('2d');

        const terminalMaskCanvas = document.createElement('canvas');
        const terminalMaskCtx = terminalMaskCanvas.getContext('2d');
        const activeTerminalMaskCanvas = document.createElement('canvas');
        const activeTerminalMaskCtx = activeTerminalMaskCanvas.getContext('2d');

        // Pre-allocate temporary canvases for mask commits to prevent memory leaks/GC pauses
        const tempNoiseMaskCanvas = document.createElement('canvas');
        const tempNoiseMaskCtx = tempNoiseMaskCanvas.getContext('2d');
        const tempGlitchMaskCanvas = document.createElement('canvas');
        const tempGlitchMaskCtx = tempGlitchMaskCanvas.getContext('2d');
        const tempGlitch2MaskCanvas = document.createElement('canvas');
        const tempGlitch2MaskCtx = tempGlitch2MaskCanvas.getContext('2d');
        const tempGlitch3MaskCanvas = document.createElement('canvas');
        const tempGlitch3MaskCtx = tempGlitch3MaskCanvas.getContext('2d');
        const tempGlitch4MaskCanvas = document.createElement('canvas');
        const tempGlitch4MaskCtx = tempGlitch4MaskCanvas.getContext('2d');
        const tempGlitch5MaskCanvas = document.createElement('canvas');
        const tempGlitch5MaskCtx = tempGlitch5MaskCanvas.getContext('2d');
        const tempTerminalMaskCanvas = document.createElement('canvas');
        const tempTerminalMaskCtx = tempTerminalMaskCanvas.getContext('2d');

        // Pre-calculate static patterns
        let noisePattern, glitchPattern, glitch2Pattern;
        let glitch3Pattern, glitch4Pattern, glitch5Pattern, terminalPattern;

        let terminalScrollY = 0;
        let sourceCodeLines = [];
        let isOfflineMode = false;

        function updateNoise() {
            const imgData = noiseCtx.createImageData(32, 32);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.random() * 255;
                data[i] = val;
                data[i + 1] = val;
                data[i + 2] = val;
                data[i + 3] = 255;
            }
            noiseCtx.putImageData(imgData, 0, 0);
            noisePattern = noiseDisplayCtx.createPattern(noiseCanvas, 'repeat');
        }

        function updateGlitch() {
            const w = 128;
            const h = 128;
            const ctx = glitchCtx;
            
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);
            
            const glitchColors = getSeededColors(currentAddress, 5);
            for (let i = 0; i < 40; i++) {
                ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                const y = Math.random() * h;
                const bandH = Math.random() * 15 + 2;
                const x = Math.random() * w;
                const bandW = Math.random() * w;
                ctx.fillRect(x, y, bandW, bandH);
            }
            
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < 0.15) {
                    const val = Math.random() > 0.5 ? 255 : 0;
                    data[i] = val;
                    data[i+1] = val;
                    data[i+2] = val;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            glitchPattern = glitchDisplayCtx.createPattern(glitchCanvas, 'repeat');
        }

        function updateGlitch2() {
            const w = 128;
            const h = 128;
            const ctx = glitch2Ctx;
            
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);
            
            const glitchColors = getSeededColors(currentAddress, 5);
            for (let i = 0; i < 60; i++) {
                ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                const y = Math.random() * h;
                const bandH = Math.random() * 4 + 1;
                const x = 0;
                const bandW = w;
                ctx.globalAlpha = Math.random() * 0.8 + 0.2;
                ctx.fillRect(x, y, bandW, bandH);
            }
            ctx.globalAlpha = 1.0;
            
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < 0.3) {
                    const isMagenta = Math.random() > 0.5;
                    data[i] = isMagenta ? 255 : 138;
                    data[i+1] = isMagenta ? 0 : 43;
                    data[i+2] = isMagenta ? 255 : 226;
                    if (Math.random() < 0.4) {
                        data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
            glitch2Pattern = glitch2DisplayCtx.createPattern(glitch2Canvas, 'repeat');
        }

        function updateGlitch3() {
            const w = glitch3Canvas.width;
            const h = glitch3Canvas.height;
            const ctx = glitch3Ctx;
            
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = 'white';
            const numBands = Math.floor(Math.random() * 20) + 30;
            const glitchColors = getSeededColors(currentAddress, 5);
            for (let i = 0; i < numBands; i++) {
                const y = Math.random() * h;
                const height = Math.random() * 4 + 1;
                const x = Math.random() * w * 0.8 - w * 0.2;
                const width = Math.random() * w * 1.5;
                ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                ctx.fillRect(x, y, width, height);
            }
            
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < 0.15) {
                    const val = Math.random() > 0.5 ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = val;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            glitch3Pattern = glitch3DisplayCtx.createPattern(glitch3Canvas, 'repeat');
        }

        function updateGlitch4() {
            const w = glitch4Canvas.width;
            const h = glitch4Canvas.height;
            const ctx = glitch4Ctx;
            
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, w, h);
            
            const glitchColors = getSeededColors(currentAddress, 5);
            const numBlocks = Math.floor(Math.random() * 40) + 20;
            for (let i = 0; i < numBlocks; i++) {
                const bw = Math.random() * (w / 2) + 10;
                const bh = Math.random() * (h / 2) + 10;
                const bx = Math.random() * w;
                const by = Math.random() * h;
                
                const shade = Math.floor(Math.random() * 256);
                ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                ctx.fillRect(bx, by, bw, bh);

                if (Math.random() > 0.5) {
                    ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                    const numLines = Math.floor(Math.random() * 10) + 5;
                    for (let j = 0; j < numLines; j++) {
                        const ly = by + Math.random() * bh;
                        const lh = Math.random() * 3 + 1;
                        ctx.fillRect(bx, ly, bw, lh);
                    }
                }
            }
            glitch4Pattern = glitch4DisplayCtx.createPattern(glitch4Canvas, 'repeat');
        }

        function updateGlitch5() {
            const w = glitch5Canvas.width;
            const h = glitch5Canvas.height;
            const ctx = glitch5Ctx;
            
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;

            const glitchColors = getSeededColors(currentAddress, 5);
            // Draw dot grid
            if (Math.random() > 0.3) {
                const spacing = 10 + Math.floor(Math.random() * 20);
                const offsetX = Math.random() * spacing;
                const offsetY = Math.random() * spacing;
                for (let x = offsetX; x < w; x += spacing) {
                    for (let y = offsetY; y < h; y += spacing) {
                        if (Math.random() > 0.2) {
                            ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                }
            }

            // Draw crosses
            const numCrosses = Math.floor(Math.random() * 10);
            for(let i=0; i<numCrosses; i++) {
                const cx = Math.random() * w;
                const cy = Math.random() * h;
                const cs = 4 + Math.random() * 6;
                ctx.strokeStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                ctx.beginPath();
                ctx.moveTo(cx - cs, cy); ctx.lineTo(cx + cs, cy);
                ctx.moveTo(cx, cy - cs); ctx.lineTo(cx, cy + cs);
                ctx.stroke();
            }

            // Draw circuit lines
            const numLines = Math.floor(Math.random() * 15) + 5;
            for(let i=0; i<numLines; i++) {
                const lx = Math.random() * w;
                const ly = Math.random() * h;
                const len = 20 + Math.random() * 100;
                ctx.strokeStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                if (Math.random() > 0.5) {
                    ctx.lineTo(lx + len, ly); // horizontal
                    if (Math.random() > 0.5) {
                        ctx.lineTo(lx + len, ly + (Math.random()>0.5?20:-20)); // L-shape
                    }
                } else {
                    ctx.lineTo(lx, ly + len); // vertical
                    if (Math.random() > 0.5) {
                        ctx.lineTo(lx + (Math.random()>0.5?20:-20), ly + len); // L-shape
                    }
                }
                ctx.stroke();
            }

            // Draw small boxes/rects
            const numBoxes = Math.floor(Math.random() * 20);
            for(let i=0; i<numBoxes; i++) {
                const bx = Math.random() * w;
                const by = Math.random() * h;
                const bs = 2 + Math.random() * 10;
                ctx.fillStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                ctx.strokeStyle = glitchColors[Math.floor(Math.random() * glitchColors.length)];
                if (Math.random() > 0.5) {
                    ctx.fillRect(bx, by, bs, bs);
                } else {
                    ctx.strokeRect(bx, by, bs, bs);
                }
            }
            glitch5Pattern = glitch5DisplayCtx.createPattern(glitch5Canvas, 'repeat');
        }

        function updateTerminal() {
            const w = terminalCanvas.width;
            const h = terminalCanvas.height;
            const ctx = terminalCtx;
            
            // Dark green background
            ctx.fillStyle = '#001100';
            ctx.fillRect(0, 0, w, h);
            
            // Scan lines effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            for (let y = 0; y < h; y += 3) {
                ctx.fillRect(0, y, w, 1);
            }
            
            // Phosphorous green text with glow
            const glitchColors = getSeededColors(currentAddress, 5);
            const terminalColor = glitchColors[Math.floor(Math.random() * glitchColors.length)];
            ctx.fillStyle = terminalColor;
            ctx.shadowColor = terminalColor;
            ctx.shadowBlur = 4;
            ctx.font = '6px "Roboto Mono", monospace';
            ctx.textBaseline = 'top';
            
            let lines = [];
            if (isOfflineMode) {
                if (sourceCodeLines.length === 0) {
                    sourceCodeLines = document.documentElement.outerHTML.split('\n');
                }
                lines = sourceCodeLines;
            } else {
                if (transactionBuffer.length === 0) {
                    lines.push("AWAITING TRANSACTIONS...");
                    lines.push("BUFFER EMPTY");
                } else {
                    lines.push(`QUEUED TRANSACTIONS: ${transactionBuffer.length}`);
                    lines.push("----------------------------------------");
                    transactionBuffer.forEach(tx => {
                        const id = tx.id || 'UNKNOWN';
                        const target = (tx.target && tx.target.address) ? tx.target.address : 'UNKNOWN_TARGET';
                        const amount = tx.amount !== undefined ? (tx.amount / 1000000).toFixed(6) + ' XTZ' : '0.000000 XTZ';
                        lines.push(`[TX: ${id}]`);
                        lines.push(`  TO: ${target}`);
                        lines.push(`  AMT: ${amount}`);
                        lines.push("");
                    });
                }
            }
            
            terminalScrollY += 0.5;
            const lineHeight = 8;
            const totalHeight = lines.length * lineHeight;
            if (terminalScrollY > totalHeight) terminalScrollY = 0;
            
            const startLine = Math.floor(terminalScrollY / lineHeight);
            const offsetY = -(terminalScrollY % lineHeight);
            
            for (let i = 0; i < h / lineHeight + 2; i++) {
                const lineIdx = (startLine + i) % lines.length;
                if (lines[lineIdx]) {
                    ctx.fillText(lines[lineIdx].substring(0, 120), 5, offsetY + i * lineHeight);
                }
            }
            
            ctx.shadowBlur = 0; // Reset shadow
            terminalPattern = terminalDisplayCtx.createPattern(terminalCanvas, 'repeat');
        }

        let formBrushes = [];
        let transactionBuffer = [];
        let processedIds = new Set();
        let currentRotation = 0;
        let isProcessing = false;
        let layersCommitted = 0;
        let currentAddress = "tz1default";
        let gifRequested = false;
        let isCapturingGif = false;

        function startGifCapture() {
            isCapturingGif = true;
            gifRequested = false;
            const downloadBtn = document.getElementById('download-gif-btn');
            downloadBtn.textContent = "> Capturing (0/60)...";
            
            const frames = [];
            const totalFrames = 60;
            let frameCount = 0;
            const gifWidth = paintCanvas.width;
            const gifHeight = paintCanvas.height;
            
            const isGrayscale = document.querySelector('.canvas-container').classList.contains('grayscale-mode');
            
            const captureInterval = setInterval(() => {
                const compCanvas = document.createElement('canvas');
                compCanvas.width = gifWidth;
                compCanvas.height = gifHeight;
                const compCtx = compCanvas.getContext('2d');
                
                compCtx.fillStyle = 'black';
                compCtx.fillRect(0, 0, gifWidth, gifHeight);
                
                if (isGrayscale) {
                    compCtx.filter = 'grayscale(100%)';
                }
                
                compCtx.save();
                compCtx.translate(gifWidth/2, gifHeight/2);
                compCtx.rotate(currentRotation * Math.PI / 180);
                compCtx.translate(-gifWidth/2, -gifHeight/2);
                
                compCtx.drawImage(paintCanvas, 0, 0);
                compCtx.drawImage(animationCanvas, 0, 0);
                compCtx.drawImage(noiseDisplayCanvas, 0, 0);
                compCtx.drawImage(glitchDisplayCanvas, 0, 0);
                compCtx.drawImage(glitch2DisplayCanvas, 0, 0);
                compCtx.drawImage(glitch3DisplayCanvas, 0, 0);
                compCtx.drawImage(glitch4DisplayCanvas, 0, 0);
                compCtx.drawImage(glitch5DisplayCanvas, 0, 0);

            let hash = 0;
            for (let i = 0; i < address.length; i++) {

            for (let i = 0; i < count; i++) {

                colors.push(customPalette[index]);
            }
            return colors;

        class FormBrush {
            constructor(x, y, color, uniqueSeed) {
                this.x = x;
                this.y = y;
                this.color = color;
                let speed = Math.random() * 2.5 + 2.0;
                if (color !== 'noise' && color !== 'terminal text') {
                    speed *= 0.6; // Slow down by 40%
                }
                this.vx = 0;
                this.vy = 0;
                this.speed = speed;

                // Create a numeric seed from the unique string (char + txId)
                let charCode = 0;
                for (let i = 0; i < uniqueSeed.length; i++) {
                    charCode += uniqueSeed.charCodeAt(i) * (i + 1);
                }

                const travelPercent = (charCode % 100) / 100;
                // Decrease chance of long cascade by capping at 50% width
                this.maxDistance = (animationCanvas.width * 0.05) + (animationCanvas.width * 0.45 * travelPercent);
                this.distanceTravelled = 0;

                const sizePercent = ((charCode * 7) % 100) / 100;
                this.baseSize = ((animationCanvas.width * 0.0134) + (animationCanvas.width * 0.0536 * sizePercent));

                const effectiveRotation = currentRotation % 360;
                switch (effectiveRotation) {
                    case 0: this.vy = speed; break;
                    case 90: this.vx = speed; break;
                    case 180: this.vy = -speed; break;
                    case 270: this.vx = -speed; break;
                }
                this.isDone = false;
            }

            drawForm() {
                const w = this.baseSize * Math.random() * Math.random();
                const h = w;
                const num = (w * h) / 2;
                const isHorizontal = Math.random() < 0.5;
                const direction = Math.random() < 0.5 ? -1 : 1;

                // Dynamic Alpha Ramp (Transparent -> Opaque -> Transparent)
                const progress = Math.min(1, this.distanceTravelled / this.maxDistance);
                const alpha = Math.sin(progress * Math.PI);

                const lines = [];
                for (let j = 0; j < num; j++) {
                    const xx = this.x + (Math.random() * 2 - 1) * w / 2;
                    const yy = this.y + (Math.random() * 2 - 1) * h / 2;
                    const len = Math.floor(Math.random() * this.baseSize * 2 * Math.random());

                    if (len <= 0) continue;

                    const sw = 10 * Math.random() * Math.random() * Math.random();
                    const lineWidth = Math.max(0.5, sw);

                        { ctx: terminalMaskCtx, type: 'erase' },
                        { ctx: animationCtx, type: 'normal' }

                drawOps.forEach(c => {
                    c.ctx.globalAlpha = alpha;

                        c.ctx.strokeStyle = '#000000';
                        c.ctx.shadowColor = 'transparent';
                        c.ctx.shadowBlur = 0;
                        c.ctx.shadowOffsetX = 0;
                        c.ctx.shadowOffsetY = 0;
                    } else if (c.type === 'erase-interior') {
                        c.ctx.globalAlpha = 1.0; // Force full erase of the interior
                        c.ctx.globalCompositeOperation = 'destination-out';
                        c.ctx.strokeStyle = '#000000';
                        c.ctx.shadowColor = 'transparent';
                        c.ctx.shadowBlur = 0;
                        c.ctx.shadowOffsetX = 0;
                        c.ctx.shadowOffsetY = 0;
                    } else if (c.type === 'mask') {
                        c.ctx.globalCompositeOperation = 'source-over';
                        c.ctx.strokeStyle = '#ffffff';
                        c.ctx.shadowColor = 'transparent';
                        c.ctx.shadowBlur = 0;
                        c.ctx.shadowOffsetX = 0;
                        c.ctx.shadowOffsetY = 0;

                        c.ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';

                        c.ctx.strokeStyle = '#000000';
                        c.ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
                        c.ctx.shadowBlur = 15;
                        c.ctx.shadowOffsetX = 5;
                        c.ctx.shadowOffsetY = 5;
                    } else if (c.type === 'terminal-outline') {
                        c.ctx.globalCompositeOperation = 'source-over';
                        c.ctx.strokeStyle = '#00ff00';
                        c.ctx.shadowColor = '#00ff00';
                        c.ctx.shadowBlur = 1.5;
                        c.ctx.shadowOffsetX = 0;
                        c.ctx.shadowOffsetY = 0;
                    } else {
                        c.ctx.globalCompositeOperation = 'source-over';

                        c.ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                        c.ctx.shadowBlur = 5;
                        c.ctx.shadowOffsetX = 3;
                        c.ctx.shadowOffsetY = 3;
                    }

                    lines.forEach(line => {

                            c.ctx.moveTo(line.xx, line.yy);
                            c.ctx.lineTo(line.xx + line.len * direction, line.yy);
                        } else {
                            c.ctx.moveTo(line.xx, line.yy);
                            c.ctx.lineTo(line.xx, line.yy + line.len * direction);
                        }

                        if (c.type === 'glow') {
                            c.ctx.lineWidth = line.lineWidth + 0.5;
                        } else if (c.type === 'outline' || c.type === 'terminal-outline' || c.type === 'drop-shadow') {
                            c.ctx.lineWidth = line.lineWidth + 3;
                        } else if (c.type === 'erase-interior') {
                            c.ctx.lineWidth = line.lineWidth;
                        } else {
                            c.ctx.lineWidth = line.lineWidth;
                        }
                        c.ctx.stroke();

            update() {
                if (this.distanceTravelled >= this.maxDistance) {
                    this.isDone = true;
                    return;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.distanceTravelled += this.speed;

                if (this.y >= animationCanvas.height || this.y < 0 || this.x >= animationCanvas.width || this.x < 0) {
                    this.isDone = true;
                    return;
                }

                this.drawForm();
            }
        }

            if (glitch4Pattern) glitch4DisplayCtx.fillStyle = glitch4Pattern;
            glitch4DisplayCtx.fillRect(0, 0, glitch4DisplayCanvas.width, glitch4DisplayCanvas.height);
            glitch4DisplayCtx.globalCompositeOperation = 'source-over';

            // Fill with glitch5 where masks are opaque
            glitch5DisplayCtx.globalCompositeOperation = 'source-in';
            if (glitch5Pattern) glitch5DisplayCtx.fillStyle = glitch5Pattern;
            glitch5DisplayCtx.fillRect(0, 0, glitch5DisplayCanvas.width, glitch5DisplayCanvas.height);
            glitch5DisplayCtx.globalCompositeOperation = 'source-over';

            // Fill with terminal where masks are opaque
            terminalDisplayCtx.globalCompositeOperation = 'source-in';
            if (terminalPattern) terminalDisplayCtx.fillStyle = terminalPattern;
            terminalDisplayCtx.fillRect(0, 0, terminalDisplayCanvas.width, terminalDisplayCanvas.height);
            terminalDisplayCtx.globalCompositeOperation = 'source-over';

            formBrushes.forEach(brush => brush.update());
            formBrushes = formBrushes.filter(brush => !brush.isDone);
            requestAnimationFrame(animate);
        }

        function generateMockTransaction() {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let address = 'tz1';
            for (let i = 0; i < 33; i++) {
                address += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return {
                id: Math.floor(Math.random() * 1000000000),
                target: { address: address },
                amount: Math.random() > 0.9 ? 2000000 : Math.floor(Math.random() * 500000)
            };
        }

        async function fetchMoreTransactions() {
            if (isOfflineMode) {
                if (transactionBuffer.length < 50) {
                    for (let i = 0; i < 20; i++) {
                        transactionBuffer.push(generateMockTransaction());
                    }
                    if (!isProcessing) {
                        addressText.textContent = "> Offline mode active.\n> Using simulated data...";
                        processNextAddress();
                    }
                }
                return;
            }

            try {
                const response = await fetch('https://api.tzkt.io/v1/operations/transactions?limit=100&status=applied&sort.desc=id');
                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);
                const data = await response.json();

                let newTxCount = 0;
                data.forEach(tx => {
                    if (tx.target && tx.target.address && !processedIds.has(tx.id)) {
                        transactionBuffer.push(tx);
                        processedIds.add(tx.id);
                        newTxCount++;
                    }
                });

                // Keep buffer at manageable size but maintain at least 100 if possible
                if (transactionBuffer.length > 200) {
                    transactionBuffer = transactionBuffer.slice(-150);
                }

                if (transactionBuffer.length > 0 && !isProcessing) {
                    processNextAddress();
                }
            } catch (error) {
                console.error("Fetch error:", error);
                
                // Fallback to simulated data if the API fails (e.g., due to adblockers, CORS, or network issues)
                if (transactionBuffer.length < 50) {
                    for (let i = 0; i < 20; i++) {
                        transactionBuffer.push(generateMockTransaction());
                    }
                    if (!isProcessing) {
                        addressText.textContent = "> Network error.\n> Using simulated data...";
                        processNextAddress();
                    }
                }
            }
        }

        function processNextAddress() {
            if (transactionBuffer.length === 0) {
                isProcessing = false;
                addressText.textContent = "> Waiting for new transactions...";
                setTimeout(processNextAddress, 2000);
                return;
            }

            isProcessing = true;
            const currentTx = transactionBuffer.shift();

            // Commit PREVIOUS layer to paintCanvas if any
            if (layersCommitted > 0) {
                // Shrink existing content by 5%
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = paintCanvas.width;
                tempCanvas.height = paintCanvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(paintCanvas, 0, 0);

                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                const scale = 0.95;
                const nw = paintCanvas.width * scale;
                const nh = paintCanvas.height * scale;
                const ox = (paintCanvas.width - nw) / 2;
                const oy = (paintCanvas.height - nh) / 2;
                paintCtx.drawImage(tempCanvas, ox, oy, nw, nh);

                // Draw completed animation layer with a global shadow cast onto the layers below
                paintCtx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                paintCtx.shadowBlur = 40;
                paintCtx.shadowOffsetX = 0;
                paintCtx.shadowOffsetY = 0;
                paintCtx.drawImage(animationCanvas, 0, 0);

                // Reset for next operations
                paintCtx.shadowColor = 'transparent';
                paintCtx.shadowBlur = 0;
                paintCtx.shadowOffsetX = 0;
                paintCtx.shadowOffsetY = 0;

                // Commit noise mask layer
                tempNoiseMaskCtx.clearRect(0, 0, tempNoiseMaskCanvas.width, tempNoiseMaskCanvas.height);
                tempNoiseMaskCtx.drawImage(noiseMaskCanvas, 0, 0);

                noiseMaskCtx.clearRect(0, 0, noiseMaskCanvas.width, noiseMaskCanvas.height);
                // Shrink the old noise mask and make it slightly more transparent
                noiseMaskCtx.globalAlpha = 0.80;
                noiseMaskCtx.drawImage(tempNoiseMaskCanvas, ox, oy, nw, nh);
                noiseMaskCtx.globalAlpha = 1.0;
                // Draw the active noise mask at full size
                noiseMaskCtx.drawImage(activeNoiseMaskCanvas, 0, 0);

                // Commit glitch mask layer
                tempGlitchMaskCtx.clearRect(0, 0, tempGlitchMaskCanvas.width, tempGlitchMaskCanvas.height);
                tempGlitchMaskCtx.drawImage(glitchMaskCanvas, 0, 0);

                glitchMaskCtx.clearRect(0, 0, glitchMaskCanvas.width, glitchMaskCanvas.height);
                glitchMaskCtx.globalAlpha = 0.80;
                glitchMaskCtx.drawImage(tempGlitchMaskCanvas, ox, oy, nw, nh);
                glitchMaskCtx.globalAlpha = 1.0;
                glitchMaskCtx.drawImage(activeGlitchMaskCanvas, 0, 0);

                // Commit glitch2 mask layer
                tempGlitch2MaskCtx.clearRect(0, 0, tempGlitch2MaskCanvas.width, tempGlitch2MaskCanvas.height);
                tempGlitch2MaskCtx.drawImage(glitch2MaskCanvas, 0, 0);

                glitch2MaskCtx.clearRect(0, 0, glitch2MaskCanvas.width, glitch2MaskCanvas.height);
                glitch2MaskCtx.globalAlpha = 0.80;
                glitch2MaskCtx.drawImage(tempGlitch2MaskCanvas, ox, oy, nw, nh);
                glitch2MaskCtx.globalAlpha = 1.0;
                glitch2MaskCtx.drawImage(activeGlitch2MaskCanvas, 0, 0);

                // Commit glitch3 mask layer
                tempGlitch3MaskCtx.clearRect(0, 0, tempGlitch3MaskCanvas.width, tempGlitch3MaskCanvas.height);
                tempGlitch3MaskCtx.drawImage(glitch3MaskCanvas, 0, 0);

                glitch3MaskCtx.clearRect(0, 0, glitch3MaskCanvas.width, glitch3MaskCanvas.height);
                glitch3MaskCtx.globalAlpha = 0.80;
                glitch3MaskCtx.drawImage(tempGlitch3MaskCanvas, ox, oy, nw, nh);
                glitch3MaskCtx.globalAlpha = 1.0;
                glitch3MaskCtx.drawImage(activeGlitch3MaskCanvas, 0, 0);

                // Commit glitch4 mask layer
                tempGlitch4MaskCtx.clearRect(0, 0, tempGlitch4MaskCanvas.width, tempGlitch4MaskCanvas.height);
                tempGlitch4MaskCtx.drawImage(glitch4MaskCanvas, 0, 0);

                glitch4MaskCtx.clearRect(0, 0, glitch4MaskCanvas.width, glitch4MaskCanvas.height);
                glitch4MaskCtx.globalAlpha = 0.80;
                glitch4MaskCtx.drawImage(tempGlitch4MaskCanvas, ox, oy, nw, nh);
                glitch4MaskCtx.globalAlpha = 1.0;
                glitch4MaskCtx.drawImage(activeGlitch4MaskCanvas, 0, 0);

                // Commit glitch5 mask layer
                tempGlitch5MaskCtx.clearRect(0, 0, tempGlitch5MaskCanvas.width, tempGlitch5MaskCanvas.height);
                tempGlitch5MaskCtx.drawImage(glitch5MaskCanvas, 0, 0);

                glitch5MaskCtx.clearRect(0, 0, glitch5MaskCanvas.width, glitch5MaskCanvas.height);
                glitch5MaskCtx.globalAlpha = 0.80;
                glitch5MaskCtx.drawImage(tempGlitch5MaskCanvas, ox, oy, nw, nh);
                glitch5MaskCtx.globalAlpha = 1.0;
                glitch5MaskCtx.drawImage(activeGlitch5MaskCanvas, 0, 0);

                // Commit terminal mask layer
                tempTerminalMaskCtx.clearRect(0, 0, tempTerminalMaskCanvas.width, tempTerminalMaskCanvas.height);
                tempTerminalMaskCtx.drawImage(terminalMaskCanvas, 0, 0);

                terminalMaskCtx.clearRect(0, 0, terminalMaskCanvas.width, terminalMaskCanvas.height);
                terminalMaskCtx.globalAlpha = 0.80;
                terminalMaskCtx.drawImage(tempTerminalMaskCanvas, ox, oy, nw, nh);
                terminalMaskCtx.globalAlpha = 1.0;
                terminalMaskCtx.drawImage(activeTerminalMaskCanvas, 0, 0);
            }

            layersCommitted++;
            formBrushes = [];
            animationCtx.clearRect(0, 0, animationCanvas.width, animationCanvas.height);
            activeNoiseMaskCtx.clearRect(0, 0, activeNoiseMaskCanvas.width, activeNoiseMaskCanvas.height);
            activeGlitchMaskCtx.clearRect(0, 0, activeGlitchMaskCanvas.width, activeGlitchMaskCanvas.height);
            activeGlitch2MaskCtx.clearRect(0, 0, activeGlitch2MaskCanvas.width, activeGlitch2MaskCanvas.height);
            activeGlitch3MaskCtx.clearRect(0, 0, activeGlitch3MaskCanvas.width, activeGlitch3MaskCanvas.height);
            activeGlitch4MaskCtx.clearRect(0, 0, activeGlitch4MaskCanvas.width, activeGlitch4MaskCanvas.height);
            activeGlitch5MaskCtx.clearRect(0, 0, activeGlitch5MaskCanvas.width, activeGlitch5MaskCanvas.height);
            activeTerminalMaskCtx.clearRect(0, 0, activeTerminalMaskCanvas.width, activeTerminalMaskCanvas.height);

            currentRotation += 90;
            const transformValue = `rotate(${currentRotation}deg)`;
            animationCanvas.style.transform = transformValue;
            paintCanvas.style.transform = transformValue;
            noiseDisplayCanvas.style.transform = transformValue;
            glitchDisplayCanvas.style.transform = transformValue;
            glitch2DisplayCanvas.style.transform = transformValue;
            glitch3DisplayCanvas.style.transform = transformValue;
            glitch4DisplayCanvas.style.transform = transformValue;
            glitch5DisplayCanvas.style.transform = transformValue;
            terminalDisplayCanvas.style.transform = transformValue;

            const address = currentTx.target && currentTx.target.address ? currentTx.target.address : (currentTx.id || "UNKNOWN");
            currentAddress = address;
            const amount = currentTx.amount || 0;
            const isSignificant = amount > 1000000;
            addressText.textContent = `> TX: ${currentTx.id}\n> Address: ${address}${isSignificant ? ' (Major)' : ''}\n> Buffer: ${transactionBuffer.length}`;

            let charIndex = 0;
            const dripInterval = setInterval(() => {
                if (charIndex >= address.length) {
                    clearInterval(dripInterval);
                    
                    const checkFinished = setInterval(() => {
                        if (formBrushes.length === 0) {
                            clearInterval(checkFinished);
                            if (gifRequested) {
                                startGifCapture();
                            } else {
                                setTimeout(processNextAddress, 2000);
                            }
                        }
                    }, 100);
                    return;
                }
                const char = address[charIndex];
                const charCode = char.charCodeAt(0);
                
                let color;
                if (charCode % 100 < 15) { // 15% chance of solid color
                    color = customPalette[charCode % customPalette.length];
                } else {
                    color = 'rgba(255, 255, 255, 0.02)';
                }
                
                const paintRand = Math.random();
                if (paintRand < 0.04) {
                    color = 'circuit glitch';
                } else if (paintRand < 0.08) {
                    color = 'block glitch';
                } else if (paintRand < 0.12) {
                    color = 'horizontal glitch';
                } else if (paintRand < 0.16) {
                    color = 'terminal text';
                } else if (paintRand < 0.20) {
                    color = 'coloured noise 2';
                } else if (paintRand < 0.24) {
                    color = 'colored noise 1';
                } else if (paintRand < 0.28) {
                    color = 'noise';
                }

                let x, y;
                const width = animationCanvas.width;
                const height = animationCanvas.height;
                const effectiveRotation = currentRotation % 360;

                let margin = isSignificant ? 0.3 : 0;
                let rand = () => margin + (Math.random() * (1 - 2 * margin));

                switch (effectiveRotation) {
                    case 0: x = rand() * width; y = 0; break;
                    case 90: x = 0; y = rand() * height; break;
                    case 180: x = rand() * width; y = height; break;
                    case 270: x = width; y = rand() * height; break;
                }

                const uniqueSeed = char + currentTx.id;
                formBrushes.push(new FormBrush(x, y, color, uniqueSeed));

                charIndex++;
            }, 100);
        }

        function resizeCanvas() {
            const displaySize = Math.max(1, Math.min(window.innerWidth * 0.9, window.innerHeight * 0.7));
            const size = Math.max(1, Math.floor(displaySize * 0.75)); // Drop internal resolution to 75% for performance, ensure at least 1
            animationCanvas.width = paintCanvas.width = noiseDisplayCanvas.width = noiseMaskCanvas.width = activeNoiseMaskCanvas.width = glitchDisplayCanvas.width = glitchMaskCanvas.width = activeGlitchMaskCanvas.width = glitch2DisplayCanvas.width = glitch2MaskCanvas.width = activeGlitch2MaskCanvas.width = glitch3DisplayCanvas.width = glitch3MaskCanvas.width = activeGlitch3MaskCanvas.width = glitch4DisplayCanvas.width = glitch4MaskCanvas.width = activeGlitch4MaskCanvas.width = glitch5DisplayCanvas.width = glitch5MaskCanvas.width = activeGlitch5MaskCanvas.width = terminalDisplayCanvas.width = terminalMaskCanvas.width = activeTerminalMaskCanvas.width = size;
            animationCanvas.height = paintCanvas.height = noiseDisplayCanvas.height = noiseMaskCanvas.height = activeNoiseMaskCanvas.height = glitchDisplayCanvas.height = glitchMaskCanvas.height = activeGlitchMaskCanvas.height = glitch2DisplayCanvas.height = glitch2MaskCanvas.height = activeGlitch2MaskCanvas.height = glitch3DisplayCanvas.height = glitch3MaskCanvas.height = activeGlitch3MaskCanvas.height = glitch4DisplayCanvas.height = glitch4MaskCanvas.height = activeGlitch4MaskCanvas.height = glitch5DisplayCanvas.height = glitch5MaskCanvas.height = activeGlitch5MaskCanvas.height = terminalDisplayCanvas.height = terminalMaskCanvas.height = activeTerminalMaskCanvas.height = size;

            // Resize temp mask canvases
            tempNoiseMaskCanvas.width = tempGlitchMaskCanvas.width = tempGlitch2MaskCanvas.width = tempGlitch3MaskCanvas.width = tempGlitch4MaskCanvas.width = tempGlitch5MaskCanvas.width = tempTerminalMaskCanvas.width = size;
            tempNoiseMaskCanvas.height = tempGlitchMaskCanvas.height = tempGlitch2MaskCanvas.height = tempGlitch3MaskCanvas.height = tempGlitch4MaskCanvas.height = tempGlitch5MaskCanvas.height = tempTerminalMaskCanvas.height = size;

            // Update light position for fullscreen
            const filter = document.getElementById('artistic-fx');
            const light = filter.querySelector('fePointLight');
            if (light) {
                light.setAttribute('x', size / 2);
            }

            const noiseFilter = document.getElementById('noise-fx');
            if (noiseFilter) {
                const noiseLight = noiseFilter.querySelector('fePointLight');
                if (noiseLight) {
                    noiseLight.setAttribute('x', size / 2);
                }
            }
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', () => {
            const downloadBtn = document.getElementById('download-gif-btn');
            downloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!gifRequested && !isCapturingGif) {
                    gifRequested = true;
                    downloadBtn.textContent = "> Waiting for cascade...";
                }
            });

            resizeCanvas();
            animate();
            fetchMoreTransactions();
            setInterval(fetchMoreTransactions, 10000);
            
            document.querySelector('.canvas-container').addEventListener('click', function() {
                this.classList.toggle('grayscale-mode');
                document.getElementById('address-display').classList.toggle('grayscale-mode');
            });

            addressText.style.cursor = 'pointer';
            addressText.title = "Click to toggle offline mode";
            addressText.addEventListener('click', (e) => {
                e.stopPropagation();
                isOfflineMode = !isOfflineMode;
                if (isOfflineMode) {
                    addressText.textContent = "> Offline mode active.\n> Using simulated data...";
                    transactionBuffer = []; // Clear buffer to immediately switch to mock data
                    fetchMoreTransactions();
                } else {
                    addressText.textContent = "> Fetching transactions...";
                    transactionBuffer = []; // Clear buffer to immediately switch to real data
                    fetchMoreTransactions();
                }
            });
        });
    </script>
</body>
